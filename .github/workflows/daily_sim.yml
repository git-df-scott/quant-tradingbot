name: Daily Forward Simulation

on:
  schedule:
    - cron: '35 13 * * 1-5' # 9:35am ET (UTC-4 during DST) on weekdays
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  simulate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily simulation
        run: python main.py --mode simulate

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp -r logs /tmp/sim-logs
          git fetch origin main
          git reset --hard origin/main
          cp -r /tmp/sim-logs/. logs/
          git add -f logs/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "sim: daily run $(date +%Y-%m-%d)"
          git push origin main
